services:
  - type: web
    name: stagify-agent-emailer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT server:app
    healthCheckPath: /health
    disk:
      name: stagify-email-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
