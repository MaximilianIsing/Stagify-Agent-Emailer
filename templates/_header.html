<header>
  <div class="header-brand">
    <div class="brand-lockup">
      <img class="brand-logo" src="{{ url_for('static', filename='logo.png') }}" alt="Stagify logo" />
      <h1>
        {{ header_title or "Stagify" }}
        <span class="brand-sub">Email Admin</span>
      </h1>
    </div>
    <nav class="site-nav" aria-label="Main">
      <a href="{{ url_for('dashboard') }}#upload">CSV Upload</a>
      <a href="{{ url_for('dashboard') }}#debug">Debug</a>
      <a href="{{ url_for('dashboard') }}#drafts">Drafts</a>
      <a href="{{ url_for('dashboard') }}#sent">Sent Registry</a>
      <a href="{{ url_for('csv_history') }}"
         class="{% if active_nav == 'csvs' %}active{% endif %}">CSV History</a>
    </nav>
  </div>
  <div class="header-actions">
    {% if header_extra %}{{ header_extra|safe }}{% endif %}
    <form method="post" action="{{ url_for('logout') }}">
      <button class="btn btn-muted" type="submit">Log out</button>
    </form>
  </div>
</header>
