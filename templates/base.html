<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Stagify Email Admin{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Brand */
      --brand: #3b82f6;
      --brand-strong: #2563eb;
      --brand-soft: #eff6ff;
      --brand-ring: rgba(59, 130, 246, 0.35);

      /* Surfaces */
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --surface-3: #f3f4f6;

      /* Text */
      --text: #0f172a;
      --text-2: #334155;
      --muted: #64748b;
      --muted-soft: #94a3b8;

      /* Lines */
      --border: #e5e7eb;
      --border-soft: #eef0f3;

      /* Status */
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --danger-border: #fecaca;
      --success: #16a34a;
      --warn: #d97706;

      /* Effects */
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.16);
      --ring: 0 0 0 3px var(--brand-ring);

      --space: 20px;
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    :target { scroll-margin-top: 84px; }
    .card[id] { scroll-margin-top: 84px; }

    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 100% -10%, #e3f0ff 0%, rgba(227, 240, 255, 0) 55%),
        var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: var(--brand); }

    h1, h2, h3, h4 { color: var(--text); }

    /* ---------- Header ---------- */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(160%) blur(10px);
      -webkit-backdrop-filter: saturate(160%) blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand) 0%, #2563eb 100%);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
      flex: none;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: contain;
      display: block;
      flex: none;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    header h1 {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    header h1 .brand-sub {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted-soft);
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav-pill-group {
      display: flex;
      gap: 4px;
      background: var(--surface-3);
      padding: 4px;
      border-radius: 999px;
    }
    .nav-pill-group a {
      color: var(--muted);
      text-decoration: none;
      padding: 7px 15px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: color .15s ease, background .15s ease;
    }
    .nav-pill-group a:hover { color: var(--text); }
    .nav-pill-group a.active {
      background: var(--surface);
      color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    /* ---------- Layout ---------- */
    main { max-width: 1160px; margin: 0 auto; padding: 32px 28px 56px; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 22px 24px;
      margin-bottom: 20px;
    }
    .card > h3:first-child,
    .card > h2:first-child { margin-top: 0; }
    h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .card h3 { margin-bottom: 4px; }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .section-head h3 { margin: 0; }

    /* ---------- Flash ---------- */
    .flash {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 13.5px;
      font-weight: 500;
      border: 1px solid transparent;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .flash::before {
      content: "";
      width: 6px;
      align-self: stretch;
      border-radius: 999px;
      flex: none;
    }
    .flash.error { background: var(--danger-soft); color: #991b1b; border-color: var(--danger-border); }
    .flash.error::before { background: var(--danger); }
    .flash.success { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .flash.success::before { background: var(--success); }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius-xs);
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 600;
      font-size: 13.5px;
      font-family: inherit;
      line-height: 1.2;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .04s ease, color .15s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: none; box-shadow: var(--ring); }
    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 1px 2px rgba(59, 130, 246, 0.4);
    }
    .btn-primary:hover { background: var(--brand-strong); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-muted {
      background: var(--surface);
      color: var(--text-2);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-muted:hover { background: var(--surface-2); border-color: #d1d5db; }
    .btn-sm {
      padding: 6px 11px;
      font-size: 12.5px;
      border-radius: 7px;
    }

    /* ---------- Stats ---------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .stat {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .stat::after {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--brand);
      opacity: 0.85;
    }
    .stat strong {
      display: block;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
    }
    .stat span {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
      margin-top: 2px;
      display: block;
    }

    /* ---------- Tables ---------- */
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 12px 12px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: top;
      font-size: 13.5px;
    }
    thead th {
      color: var(--muted);
      font-weight: 600;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    tbody tr { transition: background .12s ease; }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr:last-child td { border-bottom: none; }
    .table-compact th,
    .table-compact td {
      padding: 9px 10px;
      font-size: 13px;
      vertical-align: middle;
    }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    /* ---------- Tabs ---------- */
    .tabs {
      display: inline-flex;
      gap: 2px;
      margin-bottom: 18px;
      background: var(--surface-3);
      padding: 4px;
      border-radius: 999px;
    }
    .tabs a {
      display: inline-block;
      padding: 7px 15px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: transparent;
      transition: background .15s ease, color .15s ease;
    }
    .tabs a:hover { color: var(--text); }
    .tabs a.active {
      background: var(--surface);
      color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    /* ---------- Badges ---------- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
      text-transform: capitalize;
    }
    .badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
    }
    .badge.pending { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .badge.sent { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .badge.rejected { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .badge.failed { background: #fef2f2; color: #7f1d1d; border-color: #fca5a5; }

    /* ---------- Forms ---------- */
    label { font-weight: 500; color: var(--text-2); }
    input[type=password],
    input[type=email],
    input[type=text],
    input[type=number],
    input[type=file],
    select,
    textarea,
    .password-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      margin-bottom: 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus,
    select:focus,
    textarea:focus,
    .password-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: var(--ring);
    }
    input[type=file] {
      padding: 8px 10px;
      cursor: pointer;
    }
    input[type=file]::file-selector-button {
      margin-right: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
      font-weight: 600;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
    }
    input[type=file]::file-selector-button:hover { background: var(--surface-3); }
    ::placeholder { color: var(--muted-soft); }

    .password-field {
      position: relative;
      margin-bottom: 12px;
    }
    .password-field .password-input {
      width: 100%;
      padding-right: 80px;
      margin-bottom: 0;
    }
    .password-field .password-toggle {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      min-width: 60px;
      padding: 6px 10px;
      font-size: 12.5px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
      box-shadow: none;
    }
    .password-field .password-toggle:hover { background: var(--surface-3); }
    .password-input.password-visible {
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      letter-spacing: 0.03em;
    }

    .debug-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }
    .debug-toggle input { width: auto; margin: 0; }

    .range-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .range-grid label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-2);
    }
    .range-grid input,
    .range-grid select { margin-bottom: 0; }

    /* ---------- CSV card ---------- */
    .csv-card { padding: 20px 22px; }
    .csv-upload-form {
      margin-bottom: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .csv-upload-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
    }
    .csv-upload-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 150px;
    }
    .csv-title { font-size: 14px; font-weight: 600; }
    .csv-hint { font-size: 11.5px; }
    .csv-hint a { color: var(--brand); font-weight: 600; }
    .csv-file-input {
      flex: 1 1 200px;
      min-width: 170px;
      margin-bottom: 0;
      font-size: 13px;
    }
    .csv-file-info {
      font-size: 12px;
      white-space: nowrap;
      font-weight: 600;
      color: var(--brand);
    }
    .csv-range-details {
      margin-top: 12px;
      font-size: 12.5px;
    }
    .csv-range-details summary {
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }
    .csv-range-details summary::-webkit-details-marker { display: none; }
    .csv-range-details summary:hover { color: var(--text); }
    .csv-range-details summary .caret {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid currentColor;
      transition: transform .15s ease;
    }
    .csv-range-details[open] summary .caret { transform: rotate(180deg); }
    .csv-range-note {
      margin: 8px 0 6px;
      font-size: 11.5px;
    }
    .range-grid.compact {
      grid-template-columns: repeat(4, minmax(72px, 1fr));
      gap: 8px;
      max-width: 440px;
    }
    .range-grid.compact label {
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
    }
    .range-grid.compact input,
    .range-grid.compact select {
      padding: 6px 8px;
      font-size: 12.5px;
    }
    .csv-table { margin-top: 4px; }
    .csv-name { max-width: 240px; word-break: break-word; font-weight: 600; }
    .csv-name .badge { margin-left: 8px; vertical-align: middle; }
    .csv-rows { font-size: 12px; white-space: nowrap; }
    .csv-date { font-size: 12px; white-space: nowrap; }
    .csv-actions { text-align: right; white-space: nowrap; }
    .csv-empty {
      margin: 8px 0 0;
      font-size: 13.5px;
      padding: 24px;
      text-align: center;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
    }

    /* ---------- Purge ---------- */
    .purge-warning {
      background: var(--danger-soft);
      border: 1px solid var(--danger-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin: 4px 0;
    }
    .purge-warning p {
      margin: 8px 0 14px;
      font-size: 13px;
      color: #7f1d1d;
    }
    .purge-warning strong { color: #991b1b; }
    .purge-form label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #7f1d1d;
    }
    .purge-form input { margin-top: 5px; margin-bottom: 0; }
    .purge-form code {
      background: #fff;
      border: 1px solid var(--danger-border);
      border-radius: 5px;
      padding: 1px 6px;
      font-size: 12px;
    }
    .purge-actions { display: flex; gap: 8px; margin-top: 4px; }
    .csv-purge-row td { background: #fffafa; padding-top: 0; }

    /* ---------- Modal ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      animation: overlay-in .15s ease;
    }
    @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
    .modal-overlay[hidden] { display: none; }
    .modal-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 24px 26px;
      width: 100%;
      max-width: 480px;
      animation: modal-in .18s cubic-bezier(.2, .8, .2, 1);
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: none; }
    }
    .modal-card h3 { margin: 0 0 6px; font-size: 17px; font-weight: 600; }
    .modal-card textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 8px;
    }
    .restage-note { margin: 0 0 16px; font-size: 12px; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ---------- Misc ---------- */
    form.inline { display: inline; }
    .muted { color: var(--muted); font-size: 13px; }
    code { font-family: "SFMono-Regular", Consolas, "Courier New", monospace; }

    .debug-banner {
      margin: 14px 0 0;
      padding: 11px 14px;
      border-radius: var(--radius-xs);
      background: #fffbeb;
      color: #92400e;
      border: 1px solid #fde68a;
      font-size: 13.5px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .worker-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: var(--muted);
      font-weight: 500;
    }
    .worker-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted-soft);
      flex: none;
    }
    .worker-dot.on {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
    }
    .worker-dot.off { background: var(--danger); }

    /* ---------- Compare ---------- */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .compare-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }
    .compare-panel h4 {
      margin: 0;
      padding: 11px 14px;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .compare-panel img { display: block; width: 100%; height: auto; }
    .thumb-pair {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .thumb-pair img {
      width: 76px;
      height: 50px;
      object-fit: cover;
      border-radius: 7px;
      border: 1px solid var(--border);
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    @media (max-width: 800px) {
      .compare-grid { grid-template-columns: 1fr; }
      main { padding: 22px 16px 44px; }
      header { padding: 12px 16px; }
    }

    .bulk-help {
      background: var(--surface-alt, #f8fbff);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 12px;
    }
    .bulk-help h4 {
      margin: 14px 0 8px;
      font-size: 13px;
    }
    .bulk-help h4:first-child { margin-top: 0; }
    .bulk-help ol {
      margin: 0 0 12px;
      padding-left: 20px;
      font-size: 13px;
